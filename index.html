<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🌈 रंगों की होली · गुलाल बरसात 🌈</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #14001a; /* गहरा जामुनी रात */
            cursor: pointer;
            color: white;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8em;
            font-family: 'Segoe UI', cursive, sans-serif;
            background: rgba(0,0,0,0.4);
            padding: 0.8rem 2.5rem;
            border-radius: 60px;
            backdrop-filter: blur(6px);
            border: 1px solid gold;
            color: #ffe89c;
            text-shadow: 0 0 15px magenta;
            opacity: 1;
            transition: opacity 1s ease-out;
            z-index: 100;
            pointer-events: none;
        }
        /* होली का छोटा संदेश */
        .holi-emoji-tip {
            position: fixed;
            bottom: 12px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 2.2rem;
            pointer-events: none;
            z-index: 50;
            opacity: 0.8;
            text-shadow: 0 0 30px cyan;
            animation: wobble 4s infinite;
        }
        @keyframes wobble {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <canvas id="holiCanvas"></canvas>
    <div id="loading">🌸 रंग बरसे 🌸</div>
    <div class="holi-emoji-tip">🟠🟡🟢🔵🟣🔴❤️😍</div>

    <script>
        (function() {
            const canvas = document.getElementById('holiCanvas');
            const ctx = canvas.getContext('2d');
            const loadingElement = document.getElementById('loading');

            let canvasWidth = window.innerWidth;
            let canvasHeight = window.innerHeight;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;

            // --- ग्लोबल वेरिएबल्स ---
            let particles = [];         // रंग-बिरंगे कण (गुलाल)
            let rockets = [];            // उड़ते रॉकेट
            let texts = [];              // "Happy Holi" टेक्स्ट
            let diyas = [];              // दीयों की जगह अब रंगोली / गुलाल के छोटे पिचकारी इफेक्ट (हम दीयों को होली में बदलेंगे)
            let stars = [];              // पृष्ठभूमि तारे
            const gravity = 0.04;         // कम गुरुत्वाकर्षण ताकि गुलाल उड़े
            const textDuration = 110;      // टेक्स्ट ज़्यादा देर तक दिखे
            const numStars = Math.floor((canvasWidth * canvasHeight) / 7000);
            
            // होली स्पेशल: स्थायी रंगोली / गुलाल के धब्बे (दीयों की जगह)
            let rangoliSpots = [];

            // --- इवेंट लिसनर (क्लिक = गुलाल + रंग बरसी) ---
            function triggerHoliBlast(x, y) {
                // हर क्लिक पर: भरपूर रंगों की बौछार + रॉकेट + रंगीन बारिश
                const rand = Math.random();
                
                // 1. हमेशा गुलाल बारिश (colour rain) - खास होली फीचर
                createColourRain(x, y, 60);   // रंगों की बारिश
                
                if (rand < 0.5) {
                    // रॉकेट + बर्स्ट (50% chance)
                    rockets.push(new Rocket(x, y));
                } else {
                    // फव्वारा / पिचकारी स्टाइल (50% chance)
                    createFountain(x, y, 80);
                }
                
                // रॉकेट के अलावा एक अतिरिक्त बर्स्ट (रंगों का गोला)
                createBurst(x, y-30, 45, { 
                    baseHue: Math.random()*360, 
                    hueRange: 120,            // पूरा स्पेक्ट्रम
                    initialSpeedRange: [2, 9],
                    lifeRange: [100, 180],
                    sizeRange: [2, 6],
                    gravity: 0.02,
                    fadeFactor: 0.8
                });

                // टेक्स्ट दिखाएँ: Happy Holi + गुलाल इमोजी
                texts.push(new DisplayText(x, y));

                // एक्स्ट्रा: क्लिक के आसपास छोटे रंग छींटे
                for (let s=0; s<15; s++) {
                    setTimeout(() => {
                        let smallX = x + (Math.random()-0.5)*300;
                        let smallY = y + (Math.random()-0.5)*200;
                        createColourRain(smallX, smallY, 15);
                    }, s*15);
                }
            }

            canvas.addEventListener('mousedown', (e) => triggerHoliBlast(e.clientX, e.clientY));
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (e.touches.length > 0) {
                    triggerHoliBlast(e.touches[0].clientX, e.touches[0].clientY);
                }
            }, { passive: false });

            window.addEventListener('resize', () => {
                canvasWidth = window.innerWidth;
                canvasHeight = window.innerHeight;
                canvas.width = canvasWidth;
                canvas.height = canvasHeight;
                createStars();
                createRangoliSpots();  // होली के रंगोली स्पॉट
            });

            // --- नया: कलर रैन फंक्शन (रंगों की बारिश) ---
            function createColourRain(x, y, count = 50) {
                for (let i=0; i<count; i++) {
                    const speedX = (Math.random() - 0.5) * 7;
                    const speedY = (Math.random() - 0.8) * 10; // ऊपर-नीचे मिक्स
                    const angle = Math.atan2(speedY, speedX);
                    const speed = Math.hypot(speedX, speedY) * 0.7;
                    
                    const particleOptions = {
                        gravity: 0.03 + Math.random()*0.02,
                        friction: 0.985,
                        speed: speed,
                        life: 120 + Math.random() * 100,
                        size: 4 + Math.random() * 8,    // बड़े गुलाल कण
                        color: `hsl(${Math.random()*360}, 100%, 70%)`,
                        angle: angle,
                        trail: true,
                        trailLength: 6,
                        fadeFactor: 0.5
                    };
                    particles.push(new Particle(x, y, particleOptions));
                }
            }

            // --- पार्टिकल क्लास (थोड़ा संशोधित ताकि ट्रेल के साथ गुलाल जैसा लगे) ---
            class Particle {
                constructor(x, y, options = {}) {
                    this.x = x;
                    this.y = y;
                    this.size = options.size || Math.random() * 4 + 2;
                    const angle = options.angle !== undefined ? options.angle : Math.random() * Math.PI * 2;
                    const speed = options.speed || Math.random() * 5 + 2;
                    this.vx = Math.cos(angle) * speed * (options.speedMultiplierX || 1);
                    this.vy = Math.sin(angle) * speed * (options.speedMultiplierY || 1);
                    this.gravity = options.gravity !== undefined ? options.gravity : gravity;
                    this.friction = options.friction || 0.985;
                    this.life = options.life || 100 + Math.random() * 60;
                    this.initialLife = this.life;
                    this.color = options.color || `hsl(${Math.random() * 360}, 100%, 70%)`;
                    this.trail = options.trail || false;
                    this.history = [];
                    this.trailLength = options.trailLength || 5;
                    this.fadeFactor = options.fadeFactor || 0.7;
                }

                update() {
                    if(this.trail) {
                        this.history.push({x: this.x, y: this.y});
                        if(this.history.length > this.trailLength) this.history.shift();
                    }

                    this.vy += this.gravity;
                    this.vx *= this.friction;
                    this.vy *= this.friction;
                    this.x += this.vx;
                    this.y += this.vy;
                    this.life--;
                }

                draw(ctx) {
                    const alpha = Math.max(0, this.life / (this.initialLife * this.fadeFactor));
                    const currentSize = Math.max(0.2, this.size * (this.life / this.initialLife));

                    if (this.trail && this.history.length > 1) {
                        ctx.beginPath();
                        ctx.moveTo(this.history[0].x, this.history[0].y);
                        for(let i=1; i<this.history.length; i++) {
                            ctx.lineTo(this.history[i].x, this.history[i].y);
                        }
                        ctx.lineWidth = currentSize * 0.8;
                        ctx.strokeStyle = this.color.replace('hsl', 'hsla').replace(')', `, ${alpha*0.9})`);
                        ctx.stroke();
                    } else {
                        ctx.globalAlpha = alpha;
                        ctx.fillStyle = this.color;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, currentSize, 0, Math.PI*2);
                        ctx.fill();
                        ctx.globalAlpha = 1;
                    }
                }
            }

            // --- रॉकेट क्लास (फटने पर रंग बारिश) ---
            class Rocket {
                constructor(startX, targetY) {
                    this.x = startX;
                    this.y = canvasHeight;
                    this.targetY = targetY - 50; // थोड़ा ऊपर फटे
                    this.size = 3;
                    this.speedY = -(Math.random() * 4 + 6);
                    this.color = `hsl(${Math.random()*60 + 20}, 100%, 70%)`;
                    this.life = canvasHeight;
                    this.history = [];
                    this.trailLength = 18;
                }

                update() {
                    this.history.push({x: this.x, y: this.y});
                    if(this.history.length > this.trailLength) this.history.shift();

                    this.y += this.speedY;
                    this.speedY *= 1.008;

                    if (this.y <= this.targetY) {
                        this.life = 0;
                        // फटने पर ज़बरदस्त रंग बरसात
                        createColourRain(this.x, this.y, 90);
                        createBurst(this.x, this.y, 70, {
                            gravity: 0.02,
                            friction: 0.98,
                            initialSpeedRange: [3, 12],
                            lifeRange: [120, 200],
                            sizeRange: [3, 9],
                            colorFn: () => `hsl(${Math.random()*360}, 100%, 70%)`
                        });
                        // दूसरा बाद में छोटा बर्स्ट
                        setTimeout(() => {
                            createColourRain(this.x, this.y-20, 40);
                        }, 120);
                    }
                }

                draw(ctx) {
                    if(this.history.length > 1) {
                        ctx.beginPath();
                        ctx.moveTo(this.history[0].x, this.history[0].y);
                        for(let i=1; i<this.history.length; i++) {
                            ctx.lineTo(this.history[i].x, this.history[i].y);
                        }
                        ctx.lineWidth = this.size * 1.5;
                        ctx.strokeStyle = this.color.replace('hsl', 'hsla').replace(')', ', 0.7)');
                        ctx.stroke();
                    }
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size*1.2, 0, 2*Math.PI);
                    ctx.fill();
                }
            }

            // --- बर्स्ट फ़ंक्शन (पटाखा) ---
            function createBurst(x, y, count = 40, options = {}) {
                const baseHue = options.baseHue !== undefined ? options.baseHue : Math.random()*360;
                const hueRange = options.hueRange !== undefined ? options.hueRange : 120;
                const speedRange = options.initialSpeedRange || [2, 8];
                const lifeRange = options.lifeRange || [80, 140];
                const sizeRange = options.sizeRange || [1.5, 5];

                for (let i=0; i<count; i++) {
                    const particleOptions = {
                        gravity: options.gravity !== undefined ? options.gravity : gravity,
                        friction: options.friction || 0.985,
                        speed: Math.random()*(speedRange[1]-speedRange[0]) + speedRange[0],
                        life: Math.random()*(lifeRange[1]-lifeRange[0]) + lifeRange[0],
                        size: Math.random()*(sizeRange[1]-sizeRange[0]) + sizeRange[0],
                        color: options.colorFn ? options.colorFn() : `hsl(${(baseHue + (Math.random()-0.5)*hueRange + 360)%360}, 100%, 70%)`,
                        fadeFactor: options.fadeFactor || 0.7,
                        trail: true,
                        trailLength: 5
                    };
                    particles.push(new Particle(x, y, particleOptions));
                }
            }

            // --- फव्वारा (पिचकारी स्टाइल) ---
            function createFountain(x, y, count = 70, options = {}) {
                const baseHue = options.baseHue !== undefined ? options.baseHue : Math.random()*360;
                const speedRange = options.initialSpeedRange || [2, 8];
                const lifeRange = options.lifeRange || [60, 130];

                for (let i=0; i<count; i++) {
                    const angle = -Math.PI/2 + (Math.random()-0.5) * Math.PI*0.6;
                    const particleOptions = {
                        gravity: 0.02,
                        friction: 0.98,
                        speed: Math.random()*(speedRange[1]-speedRange[0]) + speedRange[0],
                        life: Math.random()*(lifeRange[1]-lifeRange[0]) + lifeRange[0],
                        size: 4 + Math.random()*6,
                        color: `hsl(${(baseHue + (Math.random()-0.5)*60 + 360)%360}, 100%, 70%)`,
                        angle: angle,
                        trail: true,
                        trailLength: 4,
                        fadeFactor: 0.6
                    };
                    particles.push(new Particle(x, y, particleOptions));
                }
            }

            // --- टेक्स्ट डिस्प्ले (Happy Holi) ---
            class DisplayText {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.text = "🌈 Happy Holi 🌈";  // होली विश
                    this.life = textDuration;
                    this.initialLife = this.life;
                    this.color = `hsl(${Math.random()*360}, 100%, 80%)`;
                    this.fontSize = Math.min(canvasWidth/10, 48);
                }
                update() {
                    this.y -= 0.6;
                    this.life--;
                }
                draw(ctx) {
                    const fadeOut = this.life / this.initialLife;
                    let alpha = Math.min(1, fadeOut * 1.2);
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = this.color;
                    ctx.font = `bold ${this.fontSize}px 'Segoe UI', 'Trebuchet MS', cursive`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = '#fffaae';
                    ctx.shadowBlur = 30;
                    ctx.fillText(this.text, this.x, this.y);
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1;
                }
            }

            // --- रंगोली स्पॉट (पारंपरिक दीयों की जगह रंगीन धब्बे) ---
            class RangoliSpot {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.particles = [];
                    this.hues = [0, 60, 120, 180, 240, 300]; // 7 रंग
                    for (let i=0; i<18; i++) {
                        this.particles.push({
                            offsetX: (Math.random()-0.5)*35,
                            offsetY: (Math.random()-0.5)*20,
                            size: Math.random()*12+8,
                            hue: this.hues[Math.floor(Math.random()*this.hues.length)],
                            alpha: 0.5+Math.random()*0.3
                        });
                    }
                }
                update() {
                    // मामूली हलचल
                }
                draw(ctx) {
                    this.particles.forEach(p => {
                        ctx.globalAlpha = p.alpha;
                        ctx.fillStyle = `hsl(${p.hue}, 100%, 70%)`;
                        ctx.beginPath();
                        ctx.arc(this.x + p.offsetX, this.y + p.offsetY, p.size*0.5, 0, 2*Math.PI);
                        ctx.fill();
                        // एक और इनर डॉट
                        ctx.fillStyle = `hsl(${p.hue}, 90%, 85%)`;
                        ctx.beginPath();
                        ctx.arc(this.x + p.offsetX-2, this.y + p.offsetY-2, p.size*0.2, 0, 2*Math.PI);
                        ctx.fill();
                    });
                    ctx.globalAlpha = 1;
                }
            }

            function createRangoliSpots() {
                rangoliSpots = [];
                const count = Math.floor(canvasWidth / 200) + 3;
                for (let i=0; i<count; i++) {
                    const x = (i+1) * (canvasWidth/(count+1)) + (Math.random()-0.5)*50;
                    const y = canvasHeight - 50 + (Math.random()-0.5)*30;
                    rangoliSpots.push(new RangoliSpot(x, y));
                }
            }

            // --- तारे ---
            class Star {
                constructor() {
                    this.x = Math.random()*canvasWidth;
                    this.y = Math.random()*canvasHeight*0.7;
                    this.size = Math.random()*1.5+0.5;
                    this.baseAlpha = Math.random()*0.5+0.3;
                    this.angle = Math.random()*Math.PI*2;
                    this.twinkle = Math.random()*0.03+0.01;
                }
                update() {
                    this.angle += this.twinkle;
                }
                draw(ctx) {
                    const alpha = this.baseAlpha + Math.sin(this.angle)*0.2;
                    ctx.globalAlpha = Math.max(0.2, alpha);
                    ctx.fillStyle = 'rgba(255,255,200,1)';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, 2*Math.PI);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }

            function createStars() {
                stars = [];
                for (let i=0; i<numStars; i++) stars.push(new Star());
            }

            // --- एनिमेशन लूप ---
            function animate() {
                // ट्रेल के लिए धुंधला क्लियर
                ctx.fillStyle = 'rgba(10, 0, 20, 0.12)';
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);

                stars.forEach(s => { s.update(); s.draw(ctx); });

                // रंगोली स्पॉट
                rangoliSpots.forEach(r => { r.update(); r.draw(ctx); });

                // रॉकेट
                for (let i=rockets.length-1; i>=0; i--) {
                    rockets[i].update();
                    rockets[i].draw(ctx);
                    if (rockets[i].life <= 0) rockets.splice(i,1);
                }

                // कण (गुलाल)
                for (let i=particles.length-1; i>=0; i--) {
                    particles[i].update();
                    particles[i].draw(ctx);
                    if (particles[i].life <= 0) particles.splice(i,1);
                }

                // टेक्स्ट
                for (let i=texts.length-1; i>=0; i--) {
                    texts[i].update();
                    texts[i].draw(ctx);
                    if (texts[i].life <= 0) texts.splice(i,1);
                }

                requestAnimationFrame(animate);
            }

            // --- इनिशियलाइज़ ---
            createStars();
            createRangoliSpots();

            // पहले से ही कुछ गुलाल छिड़कें (entry में ही रंग बरसे)
            setTimeout(() => {
                for (let i=0; i<12; i++) {
                    let x = Math.random()*canvasWidth;
                    let y = Math.random()*canvasHeight*0.6 + 100;
                    createColourRain(x, y, 30);
                }
                // होली के स्वागत में रॉकेट
                rockets.push(new Rocket(canvasWidth/2, canvasHeight/3));
            }, 300);

            setTimeout(() => {
                loadingElement.style.opacity = '0';
                setTimeout(() => loadingElement.style.display = 'none', 1000);
            }, 1500);

            animate();
        })();
    </script>
</body>
</html>
