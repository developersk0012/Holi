<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Govind Ice Cream Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #f5f3ff; margin:0;}
    .admin-header { background:#772aff; color:#fff; padding:15px; font-size:1.6em; text-align:center; font-weight:600;}
    .box { background:#fff; margin:40px auto 20px auto; max-width:388px; box-shadow:0 6px 23px #835cc11a; border-radius:12px; padding:28px 28px 18px 28px; }
    .form-title {font-size:1.2em;margin-bottom:19px;font-weight:600;}
    input, textarea {padding:10px;font-size:1em;border-radius:7px;border:1px solid #ccc;margin-bottom:11px;width:100%;}
    textarea {resize:none;}
    .btn { background:#32007f; color:#fff; padding:10px 30px; border:none; border-radius:7px; font-weight:600; font-size:1em; cursor:pointer;}
    .gallery { margin:32px 0; }
    .icecard { background:#f7f0ff; border-radius:13px; box-shadow:0 2px 7px #e4deed; margin:15px 0; padding:13px; position:relative;}
    .icecard img{width:96px;height:80px;object-fit:cover;border-radius:8px;}
    .desc { color:#531982; font-size:1.1em; margin:4px 0 0;}
    .delbtn { position:absolute; top:7px; right:13px; background:#e74c3c; color:#fff; border:none; border-radius:4px; padding:4px 10px; font-size:15px;}
    .back { position:fixed; top:12px; right:16px; font-size:1.1em; text-decoration:none; color:#30096d; font-weight:600;}
    .err {color:red; margin-top:8px;}
  </style>
</head>
<body>
  <div class="admin-header">Admin: Govind Ice Cream</div>
  <a class="back" href="index.html">&#8592; User Site</a>

  <div class="box" id="loginbox">
    <div class="form-title">Admin Login</div>
    <input type="password" placeholder="Admin Password" id="adminpass"/>
    <button class="btn" onclick="login()">Login</button>
    <div id="err" class="err"></div>
  </div>
  <div class="box" id="adminpanel" style="display:none;">
    <div class="form-title">Add New Ice Cream</div>
      <input type="text" id="imglink" placeholder="Image URL (jpg, png, etc)" />
      <textarea id="detail" rows="2" placeholder="Ice Cream Description"></textarea>
      <button class="btn" onclick="addIce()">Add</button>
    <div style="height:18px;"></div>
    <div class="form-title">All Ice Creams</div>
    <div class="gallery" id="admingallery"></div>
    <button class="btn" onclick="logout()">Logout</button>
  </div>

  <script>
    // Password: saten@12345
    function login() {
      var p = document.getElementById("adminpass").value;
      if (p === "saten@12345") {
        document.getElementById("loginbox").style.display="none";
        document.getElementById("adminpanel").style.display="block";
        loadAdminGallery();
      } else {
        document.getElementById("err").innerText = "गलत पासवर्ड!";
      }
    }
    function logout() {
      document.getElementById("adminpanel").style.display="none";
      document.getElementById("loginbox").style.display="block";
      document.getElementById("adminpass").value = "";
      document.getElementById("err").innerText = "";
    }
    function getData() {
      return JSON.parse(localStorage.getItem('govind_icecreams')) || [];
    }
    function saveData(data) {
      localStorage.setItem('govind_icecreams', JSON.stringify(data));
    }
    function addIce() {
      let image = document.getElementById("imglink").value.trim();
      let desc = document.getElementById("detail").value.trim();
      if(!image || !desc) { alert("Image लिंक व डिटेल दोनों डालें"); return;}
      let data = getData();
      data.push({image, desc});
      saveData(data);
      document.getElementById("imglink").value = "";
      document.getElementById("detail").value = "";
      loadAdminGallery();
    }
    function delIce(idx){
      let data = getData();
      if(confirm("हटाना है?")) {
        data.splice(idx,1);
        saveData(data);
        loadAdminGallery();
      }
    }
    function loadAdminGallery() {
      let g = document.getElementById("admingallery");
      let data = getData();
      g.innerHTML = "";
      if(data.length == 0) {
        g.innerHTML = "<div style='color:#888'>कोई आइस्क्रीम एड नहीं है !</div>";
        return;
      }
      data.forEach((item,idx)=>{
        g.innerHTML += `
        <div class="icecard">
          <button class="delbtn" onclick="delIce(${idx})">Delete</button>
          <img src="${item.image}" alt="Ice Cream"><br>
          <div class="desc">${item.desc}</div>
        </div>`;
      });
    }
    // अगर admin.html खुला है, कोई लॉगिन है तो reload करने पर आ="adminpanel" दिखाएं
    (function() {
      if (sessionStorage.getItem('admin') === "done") {
        document.getElementById("loginbox").style.display="none";
        document.getElementById("adminpanel").style.display="block";
        loadAdminGallery();
      }
    })();
    // थोड़ा session लॉक - set when login
    function setAdminSession() { sessionStorage.setItem('admin', 'done'); }
    // Patch login logout to session
    const origLogin=login, origLogout=logout;
    login=function(){ origLogin();if(document.getElementById("adminpanel").style.display=="block") setAdminSession();}
    logout=function(){ origLogout();sessionStorage.removeItem('admin');}
  </script>
</body>
</html>
